version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-tasksphere-development-secret-key
      - DEBUG=True
      - ALLOWED_HOSTS=*,localhost,127.0.0.1
    networks:
      - tasksphere-net

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - tasksphere-net

networks:
  tasksphere-net:
    driver: bridge
